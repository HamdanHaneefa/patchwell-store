<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf8f5" />
      <stop offset="50%" stop-color="#f5eff8" />
      <stop offset="100%" stop-color="#eef5fd" />
    </linearGradient>
    
    <!-- Patch Gradient -->
    <linearGradient id="patchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6b8a" />
      <stop offset="100%" stop-color="#a892b8" />
    </linearGradient>
    
    <!-- Glowing Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#7c6b8a" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgGrad)" />
  
  <!-- Outer Decorative Ring -->
  <circle cx="300" cy="300" r="220" fill="none" stroke="#e6dfeb" stroke-width="2" stroke-dasharray="8 6" opacity="0.6" />
  <circle cx="300" cy="300" r="180" fill="none" stroke="#ded5e6" stroke-width="1" opacity="0.8" />

  <!-- Wellness Patch Representation with Glow -->
  <rect x="180" y="180" width="240" height="240" rx="48" fill="url(#patchGrad)" filter="url(#glow)" />
  
  <!-- Inner Decorative Cross on the Patch -->
  <rect x="296" y="220" width="8" height="160" rx="4" fill="#ffffff" opacity="0.15" />
  <rect x="220" y="296" width="160" height="8" rx="4" fill="#ffffff" opacity="0.15" />

  <!-- Patch Center Core Icon (Leaf/Nature symbol) -->
  <g transform="translate(300, 300)">
    <!-- Central soft circular aura -->
    <circle cx="0" cy="0" r="36" fill="#ffffff" opacity="0.15" />
    
    <!-- Leaf/Drop Shape 1 -->
    <path d="M-15,-5 C-15,-20 0,-25 0,-25 C0,-25 0,-20 -5,-5 C-8,5 -15,5 -15,-5 Z" fill="#ffffff" opacity="0.9" />
    
    <!-- Leaf/Drop Shape 2 -->
    <path d="M15,5 C15,20 0,25 0,25 C0,25 0,20 5,5 C8,-5 15,-5 15,5 Z" fill="#ffffff" opacity="0.9" />
  </g>

  <!-- Brand Typography -->
  <text x="300" y="490" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Outfit', 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#2e2a39" letter-spacing="1">PATCHWELL</text>
  <text x="300" y="520" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Nunito Sans', 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#7a7178" letter-spacing="2">PREMIUM WELLNESS PATCH</text>
</svg>
